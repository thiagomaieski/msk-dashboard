name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main # ATENÇÃO: Se a sua branch no GitHub se chamar 'master', troque aqui.

jobs:
  build-and-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Pegar o código do repositório
      uses: actions/checkout@v4

    - name: 🟢 Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Instalar dependências
      run: npm install

    - name: 🏗️ Fazer a Build do React (Vite)
      run: npm run build
      # Aqui injetamos os secrets do GitHub no processo de build
      env:
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        VITE_STORAGE_API_KEY: ${{ secrets.VITE_STORAGE_API_KEY }}
        VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
        VITE_PAGESPEED_API_KEY: ${{ secrets.VITE_PAGESPEED_API_KEY }}
        VITE_SCREENSHOT_API_KEY: ${{ secrets.VITE_SCREENSHOT_API_KEY }}
        VITE_APIFY_API_KEY: ${{ secrets.VITE_APIFY_API_KEY }}

    - name: 🚀 Instalar LFTP
      run: sudo apt-get update && sudo apt-get install lftp -y

    - name: 🚀 Enviar para a Hostinger via LFTP
      env:
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        FTP_HOST: ${{ secrets.FTP_SERVER }}
      run: |
        lftp -c "set ftp:ssl-allow true; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; open -u $FTP_USER,'$FTP_PASS' $FTP_HOST; mirror -R ./dist/ ./ --parallel=10 --exclude-glob .git* --exclude .ftpquota"